# Continuous integration for pull requests and feature branches. Pushes to
# master are validated by deploy.yml instead (which runs the same reusable test
# job as a gate before deploying), so this workflow ignores master to avoid a
# duplicate run.
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches-ignore: [master]

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml
