# Deploys dist/ to the Cloudflare Pages project "jeweled" on every push to
# main (and on manual dispatch). scripts/build.sh stamps the commit SHA into
# the service-worker cache key and the BUILD constant during the build step,
# using $GITHUB_SHA — no extra CI logic needed.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Shallow clone — we only need the working tree, not history. Saves
      # ~1s on cold clones of larger repos.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # No setup-node step: ubuntu-latest already ships Node 20+ pre-installed,
      # which is all we need for `node --check`. cloudflare/wrangler-action
      # manages its own Node runtime separately. Skipping setup saves ~3-5s.

      - name: Build (copy sources into dist/)
        run: bash scripts/build.sh

      # Parse every JS file in dist/ with `node --check`. Catches syntax
      # errors that would otherwise ship to prod and leave the app stuck on
      # the boot splash (e.g. duplicate `const`, missing brace, stray comma).
      # Parallelized via xargs -P so 40 files at ~50ms each finish in ~0.3s
      # instead of ~2s sequential.
      - name: Syntax-check JS bundle
        run: |
          set -euo pipefail
          find dist -type f -name '*.js' -print0 \
            | xargs -0 -P "$(nproc)" -I{} sh -c \
                'node --check "{}" 2>&1 || { echo "::error file={}::syntax error"; exit 255; }'
          echo "Syntax OK across $(find dist -type f -name '*.js' | wc -l) files"

      # Cache the fully-installed wrangler tree (not just npm tarballs) so a
      # warm run skips `npm install` entirely. Previously we cached ~/.npm
      # under cloudflare/wrangler-action, which still paid ~7s extracting
      # tarballs into node_modules on every run. Bump the key suffix to force
      # a clean reinstall (e.g. on wrangler major upgrade).
      - name: Cache wrangler install
        id: wrangler-cache
        uses: actions/cache@v4
        with:
          path: .wrangler-install
          key: wrangler-3-${{ runner.os }}

      - name: Install wrangler
        if: steps.wrangler-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .wrangler-install
          cd .wrangler-install
          npm install wrangler@3 --no-audit --no-fund

      # Run wrangler directly instead of via cloudflare/wrangler-action — the
      # action's own version probe always reinstalls regardless of cache state.
      # --commit-dirty=true silences the "uncommitted changes" warning that
      # build.sh's untracked dist/ would otherwise trigger.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          .wrangler-install/node_modules/.bin/wrangler pages deploy dist \
            --project-name=jeweled --branch=main --commit-dirty=true
